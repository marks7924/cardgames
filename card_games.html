<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Game Collection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --dark: #0f172a;
            --darker: #020617;
            --card-bg: rgba(30, 41, 59, 0.8);
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 50%, #1e1b4b 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .floating-card {
            position: absolute;
            width: 60px; height: 84px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 8px;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }
        .floating-card:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 25s; }
        .floating-card:nth-child(2) { left: 30%; animation-delay: 5s; animation-duration: 30s; }
        .floating-card:nth-child(3) { left: 50%; animation-delay: 10s; animation-duration: 22s; }
        .floating-card:nth-child(4) { left: 70%; animation-delay: 15s; animation-duration: 28s; }
        .floating-card:nth-child(5) { left: 90%; animation-delay: 7s; animation-duration: 24s; }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.1; }
            90% { opacity: 0.1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
        .header {
            position: relative;
            z-index: 10;
            padding: 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.9) 0%, transparent 100%);
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: glow 3s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 5px rgba(99, 102, 241, 0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(236, 72, 153, 0.5)); }
        }
        .game-count { color: #94a3b8; font-size: 0.9rem; margin-bottom: 15px; }
        .sync-status {
            color: #10b981;
            font-size: 0.8rem;
            margin-bottom: 10px;
            display: none;
        }
        .sync-status.active { display: block; }
        .admin-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .admin-toggle:hover { background: rgba(99, 102, 241, 0.2); color: #fff; border-color: var(--primary); }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal {
            background: linear-gradient(135deg, var(--dark), var(--darker));
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%; max-width: 400px;
            transform: scale(0.8);
            transition: transform 0.3s;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal h2 { margin-bottom: 20px; text-align: center; color: var(--accent); }
        .password-input {
            width: 100%; padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .password-input:focus { outline: none; border-color: var(--primary); }
        .btn {
            width: 100%; padding: 15px;
            border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #94a3b8; }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }
        .admin-panel {
            display: none;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            margin: 0 20px 20px;
            border-radius: 15px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            animation: slideDown 0.5s ease;
        }
        .admin-panel.active { display: block; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .admin-panel h3 { color: var(--accent); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .admin-form { display: flex; flex-direction: column; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.9rem; color: #94a3b8; }
        .form-group input, .form-group textarea {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border-radius: 8px;
            font-size: 1rem;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .image-preview {
            width: 100%; height: 150px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #64748b;
            overflow: hidden;
            position: relative;
        }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .image-preview.has-image { border-style: solid; border-color: var(--primary); }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-input-wrapper input[type=file] { position: absolute; left: -9999px; }
        .file-input-label {
            display: block; padding: 12px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px dashed var(--primary);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            color: var(--primary);
        }
        .file-input-label:hover { background: rgba(99, 102, 241, 0.3); }
        .games-container {
            position: relative;
            z-index: 10;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            backdrop-filter: blur(10px);
        }
        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(99, 102, 241, 0.3);
        }
        .game-card::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.7s;
        }
        .game-card:hover::before { left: 100%; }
        .game-image { width: 100%; height: 200px; overflow: hidden; background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .game-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .game-card:hover .game-image img { transform: scale(1.1); }
        .game-content { padding: 20px; }
        .game-title { font-size: 1.3rem; margin-bottom: 10px; color: #fff; font-weight: 700; }
        .game-description { color: #94a3b8; font-size: 0.95rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .admin-badges { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .badge { padding: 5px 10px; border-radius: 15px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .badge-delete { background: rgba(239, 68, 68, 0.2); color: #ef4444; cursor: pointer; }
        .badge-delete:hover { background: rgba(239, 68, 68, 0.4); }
        .badge-edit { background: rgba(245, 158, 11, 0.2); color: #f59e0b; cursor: pointer; }
        .badge-edit:hover { background: rgba(245, 158, 11, 0.4); }
        .empty-state { text-align: center; padding: 60px 20px; color: #64748b; grid-column: 1 / -1; }
        .empty-state-icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.5; }
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(15, 23, 42, 0.95);
            color: #fff; padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 2000; opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: #10b981; }
        .toast.error { border-color: #ef4444; }
        .detail-modal .modal { max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .detail-image { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; margin-bottom: 20px; }
        .detail-title { font-size: 1.5rem; margin-bottom: 15px; color: var(--accent); }
        .detail-description { color: #cbd5e1; line-height: 1.6; font-size: 1rem; }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.5rem; }
            .games-container { grid-template-columns: 1fr; padding: 10px; }
            .game-card { margin: 0 10px; }
        }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 50%, #1e1b4b 100%);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s, visibility 0.5s;
        }
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loading-content {
            text-align: center;
            animation: fadeInUp 0.5s ease;
        }
        .loading-logo {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        .loading-spinner-big {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(99, 102, 241, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        .loading-text {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .loading-subtext {
            color: #94a3b8;
            font-size: 1rem;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-logo">🎴</div>
            <div class="loading-spinner-big"></div>
            <h2 class="loading-text">Loading Card Games...</h2>
            <p class="loading-subtext">Connecting to cloud database</p>
        </div>
    </div>
    <div class="bg-animation">
        <div class="floating-card"></div>
        <div class="floating-card"></div>
        <div class="floating-card"></div>
        <div class="floating-card"></div>
        <div class="floating-card"></div>
    </div>

    <header class="header">
        <h1>🎴 Board Game Collection</h1>
        <div class="sync-status" id="syncStatus">☁️ Synced to cloud</div>
        <div class="game-count" id="gameCount">Loading games...</div>
        <button class="admin-toggle" id="adminBtn">🔐 Admin Access</button>
    </header>

    <div class="admin-panel" id="adminPanel">
        <h3>⚡ Add New Game</h3>
        <form class="admin-form" id="gameForm">
            <div class="form-group">
                <label>Game Name</label>
                <input type="text" id="gameName" required placeholder="Enter game name...">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="gameDescription" required placeholder="Describe the game..."></textarea>
            </div>
            <div class="form-group">
                <label>Game Image</label>
                <div class="image-preview" id="imagePreview"><span>No image selected</span></div>
                <div class="file-input-wrapper">
                    <input type="file" id="gameImage" accept="image/*">
                    <label for="gameImage" class="file-input-label">📷 Choose Image</label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Add Game</button>
            <button type="button" class="btn btn-secondary" id="logoutBtn">Logout</button>
        </form>
    </div>

    <div class="games-container" id="gamesContainer">
        <div class="empty-state">
            <div class="empty-state-icon">🎮</div>
            <h3>No games yet</h3>
            <p>Login as admin to add your Board games!</p>
        </div>
    </div>

    <div class="modal-overlay" id="passwordModal">
        <div class="modal">
            <h2>🔐 Admin Login</h2>
            <input type="password" class="password-input" id="passwordInput" placeholder="Enter password...">
            <button class="btn btn-primary" id="loginBtn">Enter</button>
            <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        </div>
    </div>

    <div class="modal-overlay detail-modal" id="detailModal">
        <div class="modal">
            <img class="detail-image" id="detailImage" src="" alt="">
            <h2 class="detail-title" id="detailTitle"></h2>
            <p class="detail-description" id="detailDescription"></p>
            <button class="btn btn-secondary" id="closeDetailBtn" style="margin-top: 20px;">Close</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // FIREBASE CONFIG - REPLACE WITH YOUR VALUES
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBVl6xoDx9agaloGV1x15UKsbVK5-hjr5Q",
            authDomain: "card-games-de9bd.firebaseapp.com",
            databaseURL: "https://card-games-de9bd-default-rtdb.firebaseio.com",
            projectId: "card-games-de9bd",
            storageBucket: "card-games-de9bd.firebasestorage.app",
            messagingSenderId: "345640811704",
            appId: "1:345640811704:web:86142c2e38eb34cf69c84d"
        };
        // ============================================

        const ADMIN_PASSWORD = 'mark79';
        let isAdmin = false;
        let games = [];
        let currentImage = null;
        let editingId = null;
        let db = null;

        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            initFirebase();
        });

        function initFirebase() {
            const loadingScreen = document.getElementById('loadingScreen');
            
            // Timeout fallback - show games after 5 seconds no matter what
            const timeoutId = setTimeout(() => {
                console.log('Firebase timeout - showing cached or empty');
                hideLoading();
            }, 5000);

            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                
                // Load from Firebase
                db.ref('games').on('value', (snapshot) => {
                    clearTimeout(timeoutId);
                    const data = snapshot.val();
                    if (data) {
                        games = Object.values(data);
                    } else {
                        games = [];
                    }
                    renderGames();
                    updateGameCount();
                    hideLoading();
                    document.getElementById('syncStatus').classList.add('active');
                });
                
            } catch (e) {
                console.error('Firebase error:', e);
                clearTimeout(timeoutId);
                hideLoading();
                showToast('Cloud sync failed', 'error');
            }
        }

        function hideLoading() {
            const loading = document.getElementById('loadingScreen');
            if (loading) {
                loading.classList.add('hidden');
            }
        }

        function setupEventListeners() {
            document.getElementById('adminBtn').addEventListener('click', showPasswordModal);
            document.getElementById('loginBtn').addEventListener('click', checkPassword);
            document.getElementById('cancelBtn').addEventListener('click', hidePasswordModal);
            document.getElementById('passwordInput').addEventListener('keypress', function(e) {
                if(e.key === 'Enter') checkPassword();
            });
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('gameForm').addEventListener('submit', handleSubmit);
            document.getElementById('gameImage').addEventListener('change', handleImageSelect);
            document.getElementById('closeDetailBtn').addEventListener('click', hideDetailModal);
            document.getElementById('detailModal').addEventListener('click', function(e) {
                if(e.target === this) hideDetailModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    hidePasswordModal();
                    hideDetailModal();
                }
            });
        }

        function saveGames() {
            if (!db) return;
            
            const gamesObj = {};
            games.forEach((game, index) => {
                gamesObj['game' + index] = game;
            });
            db.ref('games').set(gamesObj);
            updateGameCount();
        }

        function updateGameCount() {
            const count = games.length;
            document.getElementById('gameCount').textContent = 
                count === 0 ? 'No games yet' : 
                count === 1 ? '1 game in collection' : 
                `${count} games in collection`;
        }

        function renderGames() {
            const container = document.getElementById('gamesContainer');
            
            if (games.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎮</div>
                        <h3>No games yet</h3>
                        <p>${isAdmin ? 'Add your first card game above!' : 'Login as admin to add your card games!'}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = games.map(function(game, index) {
                return `
                    <div class="game-card" data-index="${index}" style="animation: slideDown 0.5s ease ${index * 0.1}s both;">
                        <div class="game-image">
                            <img src="${game.image || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎴</text></svg>'}" alt="${escapeHtml(game.name)}">
                        </div>
                        <div class="game-content">
                            <h3 class="game-title">${escapeHtml(game.name)}</h3>
                            <p class="game-description">${escapeHtml(game.description)}</p>
                            ${isAdmin ? `
                                <div class="admin-badges">
                                    <span class="badge badge-edit" data-action="edit" data-index="${index}">Edit</span>
                                    <span class="badge badge-delete" data-action="delete" data-index="${index}">Delete</span>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.game-card').forEach(function(card) {
                card.addEventListener('click', function(e) {
                    if (e.target.classList.contains('badge')) {
                        e.stopPropagation();
                        const action = e.target.getAttribute('data-action');
                        const index = parseInt(e.target.getAttribute('data-index'));
                        if (action === 'edit') editGame(index);
                        if (action === 'delete') deleteGame(index);
                        return;
                    }
                    const index = parseInt(this.getAttribute('data-index'));
                    showGameDetail(index);
                });
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showPasswordModal() {
            if (isAdmin) {
                logout();
                return;
            }
            document.getElementById('passwordModal').classList.add('active');
            document.getElementById('passwordInput').value = '';
            setTimeout(function() {
                document.getElementById('passwordInput').focus();
            }, 100);
        }

        function hidePasswordModal() {
            document.getElementById('passwordModal').classList.remove('active');
        }

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === ADMIN_PASSWORD) {
                isAdmin = true;
                hidePasswordModal();
                document.getElementById('adminPanel').classList.add('active');
                document.getElementById('adminBtn').textContent = '🔓 Logout';
                showToast('Welcome, Admin!', 'success');
                renderGames();
            } else {
                showToast('Wrong password!', 'error');
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        function logout() {
            isAdmin = false;
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('adminBtn').textContent = '🔐 Admin Access';
            resetForm();
            renderGames();
            showToast('Logged out', 'success');
        }

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (file) {
                // Compress image before saving
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const maxWidth = 800;
                        const scale = Math.min(maxWidth / img.width, 1);
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        currentImage = canvas.toDataURL('image/jpeg', 0.7);
                        
                        const preview = document.getElementById('imagePreview');
                        preview.innerHTML = '<img src="' + currentImage + '" alt="Preview">';
                        preview.classList.add('has-image');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function handleSubmit(event) {
            event.preventDefault();
            
            const name = document.getElementById('gameName').value.trim();
            const description = document.getElementById('gameDescription').value.trim();
            
            if (!name || !description) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            if (editingId !== null) {
                games[editingId] = {
                    name: name,
                    description: description,
                    image: currentImage || games[editingId].image
                };
                showToast('Game updated!', 'success');
                editingId = null;
            } else {
                games.push({
                    name: name,
                    description: description,
                    image: currentImage
                });
                showToast('Game added!', 'success');
            }

            saveGames();
            renderGames();
            resetForm();
        }

        function resetForm() {
            document.getElementById('gameForm').reset();
            currentImage = null;
            editingId = null;
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = '<span>No image selected</span>';
            preview.classList.remove('has-image');
            document.querySelector('.admin-panel h3').textContent = '⚡ Add New Game';
        }

        function editGame(index) {
            const game = games[index];
            document.getElementById('gameName').value = game.name;
            document.getElementById('gameDescription').value = game.description;
            
            if (game.image) {
                currentImage = game.image;
                const preview = document.getElementById('imagePreview');
                preview.innerHTML = '<img src="' + currentImage + '" alt="Preview">';
                preview.classList.add('has-image');
            }
            
            editingId = index;
            document.querySelector('.admin-panel h3').textContent = '✏️ Edit Game';
            document.getElementById('adminPanel').scrollIntoView({ behavior: 'smooth' });
        }

        function deleteGame(index) {
            if (confirm('Delete this game?')) {
                games.splice(index, 1);
                saveGames();
                renderGames();
                showToast('Game deleted', 'success');
            }
        }

        function showGameDetail(index) {
            const game = games[index];
            document.getElementById('detailImage').src = game.image || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎴</text></svg>';
            document.getElementById('detailTitle').textContent = game.name;
            document.getElementById('detailDescription').textContent = game.description;
            document.getElementById('detailModal').classList.add('active');
        }

        function hideDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            
            setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
